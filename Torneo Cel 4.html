<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneo Interactivo</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 15px;
  margin: 0;
  background: #f5f5f5;
}

.container {
  max-width: 700px;
  margin: auto;
}

button {
  font-size: 18px;
  padding: 12px 18px;
  margin: 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

#game {
  display: none;
  margin-top: 20px;
}

.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  margin: 20px 0;
}

.card {
  flex: 1 1 250px;
  font-size: 22px;
  padding: 20px;
  border: 2px solid #ccc;
  border-radius: 12px;
  background: white;
  min-width: 200px;
}

.actions {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

/* HISTORIAL */
#history {
  margin-top: 25px;
  text-align: left;
  background: white;
  padding: 10px;
  border-radius: 10px;
  max-height: 200px;
  overflow-y: auto;
}

.history-item {
  font-size: 14px;
  padding: 5px 0;
  border-bottom: 1px solid #eee;
}

#winner {
  font-size: 22px;
  margin-top: 20px;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  button {
    width: 100%;
    font-size: 16px;
  }

  .card {
    font-size: 20px;
  }
}
</style>
</head>

<body>

<div class="container">

<div id="game">

  <div class="actions">

  <button onclick="start()">🔄 Reiniciar</button>

  <div id="history">

</div>

<h3 id="winner"></h3>

</div>

let list = [];

let round = 1;

function start(){

  document.getElementById("game").style.display = "block";
  document.getElementById("winner").innerText = "";
  document.getElementById("historyList").innerHTML = "";
  round = 1;

}

function nextRound(){

  if(list.length === 1){
    document.getElementById("game").style.display = "none";
    document.getElementById("winner").innerText =
      "🏆 Ganador: " + list[0];
    return;
  }

  currentA = list.splice(Math.floor(Math.random() * list.length), 1)[0];

  document.getElementById("a").innerText = "🅰️ " + currentA;
  document.getElementById("b").innerText = "🅱️ " + currentB;
}

function pick(choice){

  let eliminated;

  if(choice === "a"){
    list.push(currentB);
    eliminated = currentA;
  } else {
    list.push(currentA);
    eliminated = currentB;
  }

  addHistory(eliminated);
  round++;

  nextRound();
}

function addHistory(item){
  const div = document.createElement("div");
  div.className = "history-item";
  div.innerText = "❌ " + item;
  document.getElementById("historyList").prepend(div);
}

</script>

</body>
</html>
